<!DOCTYPE html>
<html lang="id">
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>URALA Audit Dashboard</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand:   { DEFAULT: '#F0B429', light: '#FEF3C7', dark: '#D97706' },
            ink:     '#111111',
            surface: '#FAFAFA',
            accent:  { DEFAULT: '#3B82F6', light: '#EFF6FF' },
            l1: '#FCA5A5', l2: '#FCD34D', l3: '#F0B429', l4: '#86EFAC', l5: '#22C55E'
          },
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'monospace']
          }
        }
      }
    };
  </script>
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #FAFAFA; color: #111; }
    .num { font-family: 'JetBrains Mono', monospace; }
    .tab-btn.active { color: #F0B429; }
    .tab-btn.active::after { content:''; position:absolute; left:0; right:0; bottom:-1px; height:3px; background:#F0B429; border-radius:3px; }
    .card { background:#fff; border:1px solid #E5E7EB; border-radius:14px; }
    .card:hover { box-shadow: 0 6px 20px rgba(0,0,0,.06); }
    .fade-in { animation: fade .35s ease both; }
    @keyframes fade { from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;} }
    .hm-cell { transition: transform .1s ease; }
    .hm-cell:hover { transform: scale(1.12); z-index:5; box-shadow:0 4px 10px rgba(0,0,0,.15); }
    ::-webkit-scrollbar { height:10px; width:10px; }
    ::-webkit-scrollbar-thumb { background:#E5E7EB; border-radius:8px; }
  </style>
</head>

<body>

<!-- ===================== LOGIN ===================== -->
<div id="login" class="fixed inset-0 z-50 flex items-center justify-center bg-ink">
  <div class="w-full max-w-sm mx-4 fade-in">
    <div class="text-center mb-8">
      <div class="inline-flex items-center gap-2 mb-3">
        <span class="w-9 h-9 rounded-lg bg-brand flex items-center justify-center font-extrabold text-ink text-lg">U</span>
        <span class="text-2xl font-extrabold text-white tracking-tight">URALA <span class="text-brand">AUDIT</span></span>
      </div>
      <p class="text-gray-400 text-sm">Dashboard Pemantauan Audit Kinerja</p>
    </div>
    <div class="bg-white rounded-2xl p-7 shadow-2xl">
      <label class="block text-xs font-semibold text-gray-500 mb-2">KATA SANDI</label>
      <input id="pw" type="password" placeholder="Masukkan kata sandi"
        class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-brand focus:ring-2 focus:ring-brand/30 outline-none transition mb-1"
        onkeydown="if(event.key==='Enter') doLogin()">
      <p id="pwErr" class="text-rose-500 text-xs h-4 mb-3"></p>
      <button onclick="doLogin()"
        class="w-full py-3 rounded-xl bg-brand hover:bg-brand-dark text-ink font-bold transition">
        Masuk
      </button>
    </div>
    <p class="text-center text-gray-600 text-xs mt-6">Akses khusus internal &middot; urala.id</p>
  </div>
</div>

<!-- ===================== APP ===================== -->
<div id="app" class="hidden">

  <!-- Navbar -->
  <nav class="sticky top-0 z-40 bg-ink text-white">
    <div class="max-w-[1440px] mx-auto px-6 flex items-center gap-6 h-16">
      <div class="flex items-center gap-2 shrink-0">
        <span class="w-8 h-8 rounded-lg bg-brand flex items-center justify-center font-extrabold text-ink">U</span>
        <span class="font-extrabold tracking-tight hidden sm:block">URALA <span class="text-brand">AUDIT</span></span>
      </div>
      <div class="flex items-center gap-1 sm:gap-4 text-sm font-medium overflow-x-auto flex-1">
        <button class="tab-btn active relative px-2 py-5 text-gray-300 whitespace-nowrap" data-tab="overview" onclick="switchTab('overview')">Overview</button>
        <button class="tab-btn relative px-2 py-5 text-gray-300 whitespace-nowrap" data-tab="karyawan" onclick="switchTab('karyawan')">Karyawan</button>
        <button class="tab-btn relative px-2 py-5 text-gray-300 whitespace-nowrap" data-tab="divisi" onclick="switchTab('divisi')">Divisi</button>
        <button class="tab-btn relative px-2 py-5 text-gray-300 whitespace-nowrap" data-tab="kompetensi" onclick="switchTab('kompetensi')">Kompetensi</button>
        <button class="tab-btn relative px-2 py-5 text-gray-300 whitespace-nowrap" data-tab="manager" onclick="switchTab('manager')">Manager</button>
        <button class="tab-btn relative px-2 py-5 text-gray-300 whitespace-nowrap" data-tab="analysis" onclick="switchTab('analysis')">Analysis</button>
        <button class="tab-btn relative px-2 py-5 text-gray-300 whitespace-nowrap" data-tab="validasi" onclick="switchTab('validasi')">Validasi</button>
        <button class="tab-btn relative px-2 py-5 text-gray-300 whitespace-nowrap" data-tab="data" onclick="switchTab('data')">Data Mentah</button>
      </div>
      <div class="flex items-center gap-2 shrink-0">
        <select id="divFilter" onchange="onFilter()" class="bg-gray-800 text-white text-sm rounded-lg px-3 py-2 border border-gray-700 outline-none">
          <option value="">Semua Divisi</option>
        </select>
        <button onclick="loadData()" title="Refresh" class="px-3 py-2 rounded-lg bg-gray-800 hover:bg-gray-700 border border-gray-700">&#8635;</button>
        <button onclick="logout()" title="Keluar" class="px-3 py-2 rounded-lg bg-gray-800 hover:bg-red-900 border border-gray-700 text-gray-400 hover:text-red-300 text-xs">Keluar</button>
      </div>
    </div>
  </nav>


  <main class="max-w-[1440px] mx-auto px-6 py-8">

    <!-- status bar -->
    <div class="flex items-center justify-between mb-6 flex-wrap gap-2">
      <h1 id="pageTitle" class="text-2xl sm:text-3xl font-extrabold tracking-tight">Overview</h1>
      <p class="text-xs text-gray-500">Data per <span id="lastUpdated" class="num">-</span></p>
    </div>

    <!-- loading -->
    <div id="loading" class="hidden text-center py-24 text-gray-400">
      <div class="inline-block w-10 h-10 border-4 border-brand border-t-transparent rounded-full animate-spin mb-4"></div>
      <p>Memuat data...</p>
    </div>

    <!-- TAB PANELS -->
    <section id="tab-overview" class="tab-panel"></section>
    <section id="tab-karyawan" class="tab-panel hidden"></section>
    <section id="tab-divisi" class="tab-panel hidden"></section>
    <section id="tab-kompetensi" class="tab-panel hidden"></section>
    <section id="tab-manager" class="tab-panel hidden"></section>
    <section id="tab-analysis" class="tab-panel hidden"></section>
    <section id="tab-validasi" class="tab-panel hidden"></section>
    <section id="tab-data" class="tab-panel hidden"></section>

  </main>
</div>

<script>
// ===================== CONFIG & STATE =====================
var PASSWORD = '';          // Password TIDAK disimpan di client — verifikasi di server
var SESSION_TOKEN = '';     // UUID dari server, disimpan di sessionStorage
var DATA = null;
var FILTER = '';
var CURRENT_TAB = 'overview';
var charts = {};
var TAB_TITLES = {
  overview:'Overview', karyawan:'Profil Karyawan', divisi:'Perbandingan Divisi',
  kompetensi:'Heatmap Kompetensi', manager:'Asesmen Manager', analysis:'Analisis Kelebihan & Kekurangan', validasi:'Validasi Data', data:'Data Mentah'
};
var LEVEL_COLORS = ['#FCA5A5','#FCD34D','#F0B429','#86EFAC','#22C55E'];
var LEVEL_LABELS = ['Awal','Berkembang','Terstandar','Terukur','Unggul'];

function $(id){ return document.getElementById(id); }
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function firstNum(s){ var m=String(s==null?'':s).replace(',','.').match(/-?\d+(\.\d+)?/); return m?parseFloat(m[0]):null; }

// ===================== LOGIN =====================
function doLogin(){
  var pw = $('pw').value;
  if(!pw){ $('pwErr').textContent='Masukkan kata sandi.'; return; }
  $('pwErr').textContent='';
  var btn = document.querySelector('#login button');
  btn.disabled = true; btn.textContent = 'Memeriksa...';
  google.script.run
    .withSuccessHandler(function(res){
      btn.disabled=false; btn.textContent='Masuk';
      if(res && res.ok){
        SESSION_TOKEN = res.token;
        sessionStorage.setItem('urala_token', res.token);
        showApp();
      } else {
        $('pwErr').textContent='Kata sandi salah. Coba lagi.';
        $('pw').value=''; $('pw').focus();
      }
    })
    .withFailureHandler(function(){
      btn.disabled=false; btn.textContent='Masuk';
      $('pwErr').textContent='Gagal terhubung ke server. Coba refresh halaman.';
    })
    .verifyLogin(pw);
}
function showApp(){
  $('login').classList.add('hidden');
  $('app').classList.remove('hidden');
  loadData();
}
function logout(){
  SESSION_TOKEN = '';
  sessionStorage.removeItem('urala_token');
  $('app').classList.add('hidden');
  $('login').classList.remove('hidden');
  $('pw').value=''; $('pwErr').textContent='';
}
// Pulihkan sesi jika token masih tersimpan di sessionStorage
window.addEventListener('DOMContentLoaded', function(){
  var saved = sessionStorage.getItem('urala_token');
  if(saved){ SESSION_TOKEN = saved; showApp(); }
});


// ===================== DATA LOADING =====================
function loadData(){
  $('loading').classList.remove('hidden');
  document.querySelectorAll('.tab-panel').forEach(function(p){ p.innerHTML=''; });
  if (typeof google !== 'undefined' && google.script && google.script.run){
    google.script.run.withSuccessHandler(onData).withFailureHandler(onErr).getDashboardData(SESSION_TOKEN);
  } else {
    onErr({message:'google.script.run tidak tersedia. Buka lewat URL Web App, bukan preview HTML.'});
  }
}
function onErr(e){
  $('loading').classList.add('hidden');
  $('tab-'+CURRENT_TAB).innerHTML = '<div class="card p-10 text-center text-gray-500">Gagal memuat data.<br><span class="text-xs">'+esc(e&&e.message)+'</span></div>';
}
function _handleAuth_(d){ if(d&&d._auth){ SESSION_TOKEN=''; sessionStorage.removeItem('urala_token'); logout(); return true; } return false; }
function onData(d){
  if(_handleAuth_(d)) return;
  if (d && d._error) {
    $('loading').classList.add('hidden');
    $('tab-'+CURRENT_TAB).innerHTML =
      '<div class="card p-10 text-center fade-in">'+
      '<div class="w-14 h-14 rounded-full border-4 border-brand/50 mx-auto mb-4 flex items-center justify-center text-2xl">!</div>'+
      '<p class="font-bold text-lg mb-2">Spreadsheet master tidak terhubung</p>'+
      '<p class="text-gray-500 text-sm max-w-md mx-auto mb-4">'+esc(d._error)+'</p>'+
      '<div class="bg-surface rounded-xl p-4 text-left text-xs text-gray-600 max-w-md mx-auto">'+
      '<p class="font-bold mb-2">Cara memperbaiki:</p>'+
      '<ol class="list-decimal pl-4 space-y-1">'+
      '<li>Pastikan fungsi <code class="bg-gray-100 px-1 rounded">createAuditForms()</code> sudah pernah dijalankan</li>'+
      '<li>Atau salin ID spreadsheet master dari URL Google Sheets</li>'+
      '<li>Tempel ke variabel <code class="bg-gray-100 px-1 rounded">DASHBOARD_SPREADSHEET_ID</code> di baris atas Code.gs</li>'+
      '<li>Deploy ulang Web App (Deploy > Manage deployments > Edit > Deploy)</li>'+
      '</ol></div></div>';
    return;
  }
  DATA = d;
  $('loading').classList.add('hidden');
  $('lastUpdated').textContent = d.meta.lastUpdated || '-';
  // isi filter divisi
  var sel = $('divFilter'); var cur = sel.value;
  sel.innerHTML = '<option value="">Semua Divisi</option>' + (d.divisions||[]).map(function(x){return '<option>'+esc(x)+'</option>';}).join('');
  sel.value = cur;
  renderAll();
}
function onFilter(){ FILTER = $('divFilter').value; renderAll(); }

function inFilter(div){ return !FILTER || String(div||'').trim().toLowerCase() === FILTER.toLowerCase(); }
function empFiltered(){ return (DATA.employees||[]).filter(function(e){return inFilter(e.division);}); }

// ===================== TAB SWITCH =====================
function switchTab(t){
  CURRENT_TAB = t;
  document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.toggle('active', b.dataset.tab===t); });
  document.querySelectorAll('.tab-panel').forEach(function(p){ p.classList.add('hidden'); });
  $('tab-'+t).classList.remove('hidden');
  $('pageTitle').textContent = TAB_TITLES[t];
  renderTab(t);
  // Fix: paksa chart menggambar ulang dengan ukuran benar (atasi chart kosong saat render pertama)
  setTimeout(function(){ for(var k in charts){ try{ charts[k].resize(); }catch(e){} } }, 60);
}
function renderAll(){ renderTab(CURRENT_TAB); }
function renderTab(t){
  if(!DATA) return;
  if(t==='overview') renderOverview();
  else if(t==='karyawan') renderKaryawan();
  else if(t==='divisi') renderDivisi();
  else if(t==='kompetensi') renderHeatmap();
  else if(t==='manager') renderManager();
  else if(t==='analysis') renderAnalysis();
  else if(t==='validasi') renderValidasi();
  else if(t==='data') renderRaw();
}

// ===================== HELPERS: BARS =====================
function avgBars(barsObj){
  var v = Object.keys(barsObj||{}).map(function(k){return barsObj[k];});
  if(!v.length) return null;
  return v.reduce(function(a,b){return a+b;},0)/v.length;
}
function managerRatingFor(empName){
  var n = String(empName||'').trim().toLowerCase();
  return (DATA.managerEval||[]).filter(function(m){ return String(m.employee||'').trim().toLowerCase() === n; })[0];
}
function norm(s){ return String(s==null?'':s).trim().toLowerCase(); }
function levelBadge(lvl){
  if(!lvl) return '<span class="text-gray-300">-</span>';
  return '<span class="num font-semibold px-2 py-0.5 rounded text-ink" style="background:'+LEVEL_COLORS[lvl-1]+'">L'+lvl+'</span>';
}


function destroyChart(id){ if(charts[id]){ charts[id].destroy(); delete charts[id]; } }
function statCard(label, value, unit, sub){
  return '<div class="card p-5 fade-in">'+
    '<p class="text-xs font-semibold text-gray-400 mb-3 uppercase tracking-wide">'+esc(label)+'</p>'+
    '<p class="text-3xl font-extrabold text-ink">'+esc(value)+' <span class="text-base font-semibold text-gray-400">'+esc(unit||'')+'</span></p>'+
    '<p class="text-sm text-gray-500 mt-1">'+esc(sub||'')+'</p></div>';
}
function emptyState(msg){
  return '<div class="card p-12 text-center text-gray-400 fade-in">'+
    '<div class="w-12 h-12 rounded-full border-4 border-brand/40 mx-auto mb-4"></div>'+
    '<p>'+esc(msg)+'</p></div>';
}

// ===================== TAB: OVERVIEW =====================
function renderOverview(){
  var emps = empFiltered();
  var p = $('tab-overview');
  if(!emps.length){ p.innerHTML = emptyState('Belum ada respons karyawan'+(FILTER?' untuk divisi '+FILTER:'')+'. Data akan muncul setelah form diisi.'); return; }

  var barsVals = emps.map(function(e){return avgBars(e.resolvedBars||e.bars);}).filter(function(x){return x!=null;});
  var avgB = barsVals.length ? (barsVals.reduce(function(a,b){return a+b;},0)/barsVals.length) : null;
  var reworkVals = emps.map(function(e){return firstNum(e.rework);}).filter(function(x){return x!=null;});
  var avgR = reworkVals.length ? (reworkVals.reduce(function(a,b){return a+b;},0)/reworkVals.length) : null;
  var otTotal = emps.map(function(e){return firstNum(e.overtime)||0;}).reduce(function(a,b){return a+b;},0);

  p.innerHTML =
    '<div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">'+
      statCard('Responden Karyawan', emps.length, 'orang', 'Total yang sudah mengisi')+
      statCard('Rata-rata Kompetensi', avgB!=null?avgB.toFixed(1):'-', '/ 5', 'Skor final (hasil validasi)')+
      statCard('Rata-rata Rework', avgR!=null?avgR.toFixed(0):'-', '%', 'Tingkat revisi ulang')+
      statCard('Total Lembur', otTotal||'-', 'jam', 'Akumulasi seluruh tim')+
    '</div>'+
    '<div class="card p-5"><h3 class="font-bold mb-4">Status Pengisian</h3><div id="tracker" class="overflow-x-auto"></div></div>';

  renderTracker(emps);
}


function renderWorkloadChart(){
  destroyChart('cWorkload');
  var cats = ['Sangat ringan','Ringan','Pas/seimbang','Berat','Sangat berat (overload)'];
  var colors = ['#BFDBFE','#86EFAC','#F0B429','#FB923C','#FCA5A5'];
  var counts = cats.map(function(c){
    return (DATA.managerEval||[]).filter(function(m){ return inFilter(m.division) && norm(m.workloadRating)===norm(c); }).length;
  });
  if(counts.reduce(function(a,b){return a+b;},0)===0){
    $('cWorkload').parentElement.innerHTML = '<p class="text-sm text-gray-400 text-center pt-20">Belum ada penilaian beban kerja dari manager.</p>'; return;
  }
  charts.cWorkload = new Chart($('cWorkload'),{
    type:'doughnut',
    data:{ labels:cats, datasets:[{ data:counts, backgroundColor:colors, borderWidth:2, borderColor:'#fff' }] },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{ position:'right', labels:{ font:{family:'Plus Jakarta Sans'} } } } }
  });
}
function renderOkrChart(emps){
  destroyChart('cOkr');
  var rows = emps.map(function(e){
    var t=firstNum(e.okrTarget), a=firstNum(e.okrActual);
    var pct = (t&&a!=null)? Math.round(a/t*100) : null;
    return { name:e.name||'(tanpa nama)', pct:pct };
  }).filter(function(r){return r.pct!=null;});
  if(!rows.length){
    $('cOkr').parentElement.innerHTML = '<p class="text-sm text-gray-400 text-center pt-20">Target/aktual OKR belum berupa angka yang bisa dihitung.</p>'; return;
  }
  charts.cOkr = new Chart($('cOkr'),{
    type:'bar',
    data:{ labels:rows.map(function(r){return r.name;}),
      datasets:[{ label:'% Capaian', data:rows.map(function(r){return r.pct;}),
      backgroundColor:rows.map(function(r){ return r.pct>=80?'#22C55E':(r.pct>=50?'#F0B429':'#FCA5A5'); }), borderRadius:6 }] },
    options:{ indexAxis:'y', responsive:true, maintainAspectRatio:false,
      scales:{ x:{ beginAtZero:true, ticks:{ callback:function(v){return v+'%';} } } },
      plugins:{ legend:{display:false} } }
  });
}
function renderTracker(emps){
  var html = '<table class="w-full text-sm"><thead><tr class="text-left text-gray-400 border-b border-gray-100">'+
    '<th class="py-2 pr-4">Nama</th><th class="pr-4">Divisi</th><th class="pr-4">Form Karyawan</th><th class="pr-4">Validasi</th><th>Skor Final</th></tr></thead><tbody>';
  emps.forEach(function(e){
    var rated = managerRatingFor(e.name) ? '<span class="text-green-600">&#10003; Ya</span>' : '<span class="text-gray-300">Belum</span>';
    var valid = e.validated ? '<span class="text-green-600">&#10003; Tervalidasi</span>' : '<span class="text-gray-300">Belum</span>';
    var ab = avgBars(e.resolvedBars||e.bars);
    html += '<tr class="border-b border-gray-50 hover:bg-surface cursor-pointer" onclick="gotoEmployee(\''+esc(e.name).replace(/'/g,"")+'\')">'+
      '<td class="py-2 pr-4 font-medium">'+esc(e.name||'-')+'</td>'+
      '<td class="pr-4">'+esc(e.division||'-')+'</td>'+
      '<td class="pr-4"><span class="text-green-600">&#10003; Ya</span></td>'+
      '<td class="pr-4">'+valid+'</td>'+
      '<td class="num">'+(ab!=null?ab.toFixed(1):'-')+'</td></tr>';
  });
  html += '</tbody></table>';
  $('tracker').innerHTML = html;
}
function gotoEmployee(name){ switchTab('karyawan'); setTimeout(function(){ var s=$('empSel'); if(s){ s.value=name; renderEmpProfile(); } },50); }


// ===================== TAB: KARYAWAN =====================
function renderKaryawan(){
  var emps = empFiltered();
  var p = $('tab-karyawan');
  if(!emps.length){ p.innerHTML = emptyState('Belum ada data karyawan'+(FILTER?' untuk divisi '+FILTER:'')+'.'); return; }
  var named = emps.filter(function(e){ return e.name && String(e.name).trim(); });
  var opts = named.map(function(e){return '<option>'+esc(e.name)+'</option>';}).join('');
  p.innerHTML =
    '<div class="grid lg:grid-cols-[260px_1fr] gap-6">'+
      '<div class="card p-4 h-max"><label class="text-xs font-semibold text-gray-400">PILIH KARYAWAN</label>'+
        '<select id="empSel" onchange="renderEmpProfile()" class="w-full mt-2 px-3 py-2 rounded-lg border border-gray-200 outline-none focus:border-brand">'+opts+'</select>'+
        '<div id="empMini" class="mt-4 space-y-1 text-sm"></div></div>'+
      '<div id="empBody"></div>'+
    '</div>';
  renderEmpProfile();
}
function renderEmpProfile(){
  var name = ($('empSel').value || '').trim();
  var e = empFiltered().filter(function(x){ return String(x.name||'').trim() === name; })[0];
  if(!e){ $('empBody').innerHTML = emptyState('Data tidak ditemukan.'); return; }
  var mr = managerRatingFor(e.name);
  var rec = mr ? mr.recommendation : '';

  $('empBody').innerHTML =
    '<div class="card p-5 mb-6 fade-in"><div class="flex items-start justify-between flex-wrap gap-3">'+
      '<div><h2 class="text-xl font-extrabold">'+esc(e.name||'-')+'</h2>'+
        '<p class="text-gray-500 text-sm">'+esc(e.position||'-')+' &middot; '+esc(e.division||'-')+' &middot; '+esc(e.tenure||'-')+'</p>'+
        '<p class="text-gray-400 text-xs mt-1">Atasan: '+esc(e.manager||'-')+'</p></div>'+
      recBadge(rec)+
    '</div></div>'+
    '<div class="grid lg:grid-cols-2 gap-6 mb-6">'+
      '<div class="card p-5"><h3 class="font-bold mb-1">Profil Kompetensi</h3>'+
        '<p class="text-xs text-gray-400 mb-3">Biru: penilaian diri &middot; Kuning: hasil akhir (validasi)</p>'+
        '<div style="height:300px"><canvas id="cEmpRadar"></canvas></div></div>'+
      '<div class="space-y-4">'+
        '<div class="grid grid-cols-3 gap-3">'+
          miniMetric('Lembur', firstNum(e.overtime), 'jam')+
          miniMetric('Rework', firstNum(e.rework), '%')+
          miniMetric('Skor Final', avgBars(e.resolvedBars||e.bars), '/5')+
        '</div>'+
        okrBox(e)+
      '</div>'+

function divEmps(d){ return (DATA.employees||[]).filter(function(e){return norm(e.division)===norm(d);}); }
function avgOf(arr){ var v=arr.filter(function(x){return x!=null;}); return v.length? v.reduce(function(a,b){return a+b;},0)/v.length : null; }

function renderDivBars(divs){
  destroyChart('cDivBars');
  var comps = DATA.values || [];
  var palette = ['#F0B429','#3B82F6','#111111'];
  var ds = divs.map(function(d,i){
    return { label:d, backgroundColor:palette[i%palette.length], borderRadius:5,
      data: comps.map(function(c){ return avgOf(divEmps(d).map(function(e){return (e.resolvedBars&&e.resolvedBars[c])||e.bars[c]||null;})) || 0; }) };
  });
  charts.cDivBars = new Chart($('cDivBars'),{
    type:'bar', data:{ labels:comps, datasets:ds },
    options:{ responsive:true, maintainAspectRatio:false, scales:{ y:{ min:0, max:5, ticks:{stepSize:1} } }, plugins:{ legend:{position:'bottom'} } }
  });
}
function renderDivWork(divs){
  destroyChart('cDivWork');
  var cats=['Sangat ringan','Ringan','Pas/seimbang','Berat','Sangat berat (overload)'];
  var colors=['#BFDBFE','#86EFAC','#F0B429','#FB923C','#FCA5A5'];
  var ds = cats.map(function(c,i){
    return { label:c, backgroundColor:colors[i], data: divs.map(function(d){
      return (DATA.managerEval||[]).filter(function(m){return norm(m.division)===norm(d)&&norm(m.workloadRating)===norm(c);}).length;
    }) };
  });
  charts.cDivWork = new Chart($('cDivWork'),{
    type:'bar', data:{ labels:divs, datasets:ds },
    options:{ responsive:true, maintainAspectRatio:false, scales:{ x:{stacked:true}, y:{stacked:true, ticks:{stepSize:1}} }, plugins:{ legend:{position:'bottom'} } }
  });
}


function renderDivScore(divs){
  var rows = divs.map(function(d){
    var es = divEmps(d);
    var okr = avgOf(es.map(function(e){ var t=firstNum(e.okrTarget),a=firstNum(e.okrActual); return (t&&a!=null)?(a/t*100):null; }));
    return { d:d, n:es.length,
      ot: avgOf(es.map(function(e){return firstNum(e.overtime);})),
      rw: avgOf(es.map(function(e){return firstNum(e.rework);})),
      okr: okr, bars: avgOf(es.map(function(e){return avgBars(e.resolvedBars||e.bars);})) };
  });
  var html='<table class="w-full text-sm"><thead><tr class="text-left text-gray-400 border-b border-gray-100">'+
    '<th class="py-2 pr-4">Divisi</th><th class="pr-4">Jumlah</th><th class="pr-4">Avg Lembur</th><th class="pr-4">Avg Rework</th><th class="pr-4">Avg OKR</th><th>Avg Kompetensi</th></tr></thead><tbody>';
  rows.forEach(function(r){
    html+='<tr class="border-b border-gray-50">'+
      '<td class="py-2 pr-4 font-semibold">'+esc(r.d)+'</td>'+
      '<td class="pr-4 num">'+r.n+'</td>'+
      '<td class="pr-4 num">'+(r.ot!=null?r.ot.toFixed(1)+' jam':'-')+'</td>'+
      '<td class="pr-4 num">'+(r.rw!=null?r.rw.toFixed(0)+'%':'-')+'</td>'+
      '<td class="pr-4 num">'+(r.okr!=null?r.okr.toFixed(0)+'%':'-')+'</td>'+
      '<td class="num">'+(r.bars!=null?r.bars.toFixed(1):'-')+'</td></tr>';
  });
  html+='</tbody></table>';
  $('divScore').innerHTML = html;
}

function hmBtn(mode,label){
  var act = HM_MODE===mode;
  return '<button onclick="HM_MODE=\''+mode+'\';drawHeatmap();syncHmBtns()" data-hm="'+mode+'" class="hmbtn px-4 py-2 rounded-lg text-sm font-semibold border '+(act?'bg-brand text-ink border-brand':'bg-white text-gray-500 border-gray-200')+'">'+label+'</button>';

function syncHmBtns(){ document.querySelectorAll('.hmbtn').forEach(function(b){ var a=b.dataset.hm===HM_MODE; b.className='hmbtn px-4 py-2 rounded-lg text-sm font-semibold border '+(a?'bg-brand text-ink border-brand':'bg-white text-gray-500 border-gray-200'); }); }


function drawHeatmap(){
  var emps = empFiltered();
  var comps = DATA.values || [];
  var head = '<div style="display:grid;grid-template-columns:160px repeat('+comps.length+',1fr);gap:6px;min-width:'+(160+comps.length*120)+'px">';
  head += '<div></div>'+comps.map(function(c){return '<div class="text-xs font-bold text-center text-gray-600 px-1">'+esc(c)+'</div>';}).join('');
  emps.forEach(function(e){
    head += '<div class="text-sm font-medium truncate pr-2 flex items-center cursor-pointer hover:text-brand-dark" title="'+esc(e.name)+'" onclick="gotoEmployee(\''+esc(e.name).replace(/\'/g,"")+'\')">'+esc(e.name||'-')+'</div>';
    comps.forEach(function(c){
      var self = e.bars[c]||null;
      var fin = (e.resolvedBars && e.resolvedBars[c]) || null;
      var cell;
      if(HM_MODE==='self') cell = cellHtml(self, e.name, c, 'Diri');
      else if(HM_MODE==='final') cell = cellHtml(fin, e.name, c, 'Final');
      else { // gap: diri vs hasil akhir
        if(self!=null && fin!=null){ var g=self-fin; cell = gapCell(g, e.name, c, self, fin); }
        else cell = '<div class="hm-cell rounded-lg flex items-center justify-center text-xs text-gray-300" style="height:44px;background:#F3F4F6">-</div>';
      }
      head += cell;
    });
  });
  head += '</div>';
  $('hmGrid').innerHTML = head;
}
function cellHtml(lvl,name,comp,who){
  if(!lvl) return '<div class="hm-cell rounded-lg flex items-center justify-center text-xs text-gray-300" style="height:44px;background:#F3F4F6">-</div>';
  return '<div class="hm-cell rounded-lg flex items-center justify-center num font-bold text-ink" style="height:44px;background:'+LEVEL_COLORS[lvl-1]+'" title="'+esc(name)+' - '+esc(comp)+' ('+who+'): Level '+lvl+'">L'+lvl+'</div>';
}
function gapCell(g,name,comp,self,other){
  var bg = g>0?'#93C5FD':(g<0?'#FCA5A5':'#D1D5DB');
  var txt = g>0?('+'+g):(''+g);
  var tip = esc(name)+' - '+esc(comp)+': diri L'+self+' vs manager L'+other+' (gap '+txt+')';
  return '<div class="hm-cell rounded-lg flex items-center justify-center num font-bold text-ink" style="height:44px;background:'+bg+'" title="'+tip+'">'+txt+'</div>';
}

var ANALYSIS = null;

function renderAnalysis(){

function runRCANow(){

function rcaSection(name){
  var r = RCA_CACHE[name];
  var btnLabel = r && !r._error ? 'Analisis Ulang' : 'Jalankan Root Cause Analysis';

      '<button id="runRcaBtn" onclick="runRCANow()" '+(RCA_LOADING?'disabled':'')+' class="px-4 py-2 rounded-lg bg-ink text-white text-sm font-semibold hover:bg-gray-800 '+(RCA_LOADING?'opacity-60':'')+'">'+(RCA_LOADING?'Menganalisis...':btnLabel)+'</button>'+
    '</div>'+
    '<p class="text-xs text-gray-400 mb-3">Alur: <b>MECE</b> (pisahkan penyebab) &rarr; <b>Fishbone</b> (Ishikawa) &rarr; saran titik mulai <b>5 Whys</b>. Mengintegrasikan NLP + LLM.</p>';
  if(RCA_LOADING){
    return head + '<div class="text-center py-10 text-gray-400"><div class="inline-block w-8 h-8 border-4 border-brand border-t-transparent rounded-full animate-spin mb-2"></div><p class="text-sm">Menelusuri akar masalah (MECE, fishbone, 5 whys)...</p></div></div>';
  }
  if(!r){ return head + '<p class="text-sm text-gray-400">Klik tombol di atas untuk menelusuri akar masalah <b>'+esc(name)+'</b>.</p></div>'; }
  if(r._error){ return head + '<div class="bg-amber-50 text-amber-700 text-sm rounded-lg p-3">'+esc(r._error)+'</div></div>'; }
  if(r.noProblem){ return head + '<div class="bg-green-50 text-green-700 text-sm rounded-lg p-3">&#10003; '+esc(r.effect)+'. Tidak perlu RCA.</div></div>'; }
  return head + rcaBody(r) + '</div>';

function rcaBody(r){
  var aiTag = r.aiActive ? '<span class="text-[10px] px-1.5 py-0.5 rounded bg-blue-50 text-blue-600">'+esc(r.method||'AI+rule')+'</span>' : '<span class="text-[10px] px-1.5 py-0.5 rounded bg-amber-100 text-amber-700">mode keyword</span>';
  // 1) Effect + Root cause banner

        '<p class="text-sm font-semibold text-gray-800">'+esc(r.effect)+'</p></div>'+
      '<div class="rounded-xl p-4 bg-brand-light border border-brand/40">'+
        '<p class="text-[11px] font-bold text-brand-dark uppercase tracking-wide mb-1">Hipotesis Akar Masalah</p>'+
        '<p class="text-sm font-semibold text-gray-800">'+esc(r.rootCause)+'</p></div>'+
    '</div>';
  // 2) Fishbone diagram (digambar setelah innerHTML diset)
  var fishbone =
    '<div class="mb-2 flex items-center justify-between"><h4 class="font-bold text-sm">Diagram Fishbone (Ishikawa)</h4>'+
      '<div class="flex items-center gap-2">'+aiTag+'<span class="num text-[10px] px-1.5 py-0.5 rounded bg-gray-100 text-gray-600">keyakinan '+Math.round((Number(r.confidence)||0)*100)+'%</span></div></div>'+
    '<div class="card p-2 mb-5 overflow-x-auto"><div id="fishbone" style="min-width:760px"></div></div>';
  // 3) MECE table
  var mece = '<h4 class="font-bold text-sm mb-2">Penyebab ter-MECE (6 kategori)</h4><div class="grid md:grid-cols-2 lg:grid-cols-3 gap-3 mb-5">';
  (r.categories||[]).forEach(function(c){
    var causes = (c.causes||[]);
    var list = causes.length
      ? causes.map(function(x){ return '<li class="text-xs text-gray-700 mb-1">&bull; '+esc(x.cause)+(x.from==='AI'?' <span class="text-[9px] text-blue-500">AI</span>':'')+(x.evidence?'<span class="block text-[10px] text-gray-400 italic ml-2">'+esc(x.evidence)+'</span>':'')+'</li>'; }).join('')
      : '<li class="text-xs text-gray-300">&ndash; tidak ada</li>';
    mece += '<div class="rounded-lg border '+(causes.length?'border-gray-200':'border-gray-100')+' p-3">'+
      '<p class="text-xs font-bold mb-1" style="color:'+meceColor(c.id)+'">'+esc(c.id)+' &middot; '+esc(c.name)+' <span class="num text-gray-400">('+causes.length+')</span></p>'+
      '<ul>'+list+'</ul></div>';
  });
  mece += '</div>';
  // 4) 5 Whys starter

    '<div class="rounded-xl border border-accent/40 bg-accent-light p-4">'+
      (fw.focus?'<p class="text-[11px] text-accent font-bold uppercase mb-1">Mulai dari kategori: '+esc(fw.focus)+'</p>':'')+
      '<p class="text-sm text-gray-600 mb-2"><b>Pernyataan masalah:</b> '+esc(fw.problem||r.effect)+'</p>'+
      '<div class="bg-white rounded-lg p-3 border border-accent/30 mb-2"><p class="text-[11px] text-gray-400 font-semibold mb-0.5">PERTANYAAN "MENGAPA" PERTAMA</p>'+
        '<p class="text-base font-bold text-ink">&#10067; '+esc(fw.first_why||('Mengapa '+(r.effect||'')+'?'))+'</p></div>'+
      (fw.rationale?'<p class="text-xs text-gray-500"><b>Alasan:</b> '+esc(fw.rationale)+'</p>':'')+
      '<div class="mt-3 grid gap-1.5">'+
        [1,2,3,4,5].map(function(n){ return '<div class="flex items-center gap-2 text-xs text-gray-400"><span class="w-6 h-6 rounded-full bg-white border border-accent/40 flex items-center justify-center font-bold text-accent shrink-0">'+n+'</span><span class="border-b border-dashed border-gray-200 flex-1 pb-1">'+(n===1?'<span class="text-gray-700">'+esc(fw.first_why||'')+'</span>':'Mengapa ... ? (lanjutkan jawaban dari Why '+(n-1)+')')+'</span></div>'; }).join('')+
      '</div>'+
    '</div>';
  return banner + fishbone + mece + whys;
}
function meceColor(id){
  var map = { M1:'#D97706', M2:'#3B82F6', M3:'#22C55E', M4:'#A855F7', M5:'#EF4444', M6:'#0EA5E9' };
  return map[id] || '#111111';
}
// ---- Gambar Fishbone sebagai SVG ----
function drawFishbone(r){
  var host = $('fishbone'); if(!host) return;
  var W=760, H=460, midY=H/2, headX=W-150;
  // posisi tulang: 3 atas, 3 bawah (urutan M1..M6)
  var slots = [
    {id:'M1', sx:170, dir:-1}, {id:'M2', sx:330, dir:-1}, {id:'M3', sx:490, dir:-1},
    {id:'M4', sx:250, dir:1},  {id:'M5', sx:410, dir:1},  {id:'M6', sx:570, dir:1}
  ];
  var byId={}; (r.categories||[]).forEach(function(c){ byId[c.id]=c; });
  var svg = '<svg viewBox="0 0 '+W+' '+H+'" width="100%" style="font-family:Plus Jakarta Sans">';
  // spine
  svg += '<line x1="40" y1="'+midY+'" x2="'+headX+'" y2="'+midY+'" stroke="#111" stroke-width="3"/>';
  svg += '<polygon points="'+headX+','+(midY-8)+' '+headX+','+(midY+8)+' '+(headX+14)+','+midY+'" fill="#111"/>';
  // head (effect)
  svg += '<rect x="'+(headX+14)+'" y="'+(midY-46)+'" width="132" height="92" rx="10" fill="#FEE2E2" stroke="#FCA5A5"/>';
  svg += fishText(headX+22, midY-28, r.effect||'', 17, 4, '#991B1B', 11, true);
  // bones
  slots.forEach(function(s){
    var c = byId[s.id] || {id:s.id, name:s.id, causes:[]};
    var color = meceColor(s.id);
    var endX = s.sx-90;
    var endY = midY + s.dir*(midY-44);
    // tulang diagonal
    svg += '<line x1="'+s.sx+'" y1="'+midY+'" x2="'+endX+'" y2="'+endY+'" stroke="'+color+'" stroke-width="2.5"/>';
    // label kategori di ujung
    var labY = endY + (s.dir<0? -6 : 18);
    svg += '<rect x="'+(endX-6)+'" y="'+(labY-13)+'" width="150" height="18" rx="5" fill="'+color+'"/>';
    svg += '<text x="'+(endX)+'" y="'+(labY)+'" font-size="11" font-weight="700" fill="#fff">'+escSvg(s.id+' '+c.name).slice(0,24)+'</text>';
    // sampai 3 penyebab sebagai teks kecil dekat tulang
    var causes=(c.causes||[]).slice(0,3);
    causes.forEach(function(x,i){
      var cy = s.dir<0 ? (midY - 30 - i*16 - (s.sx-endX)*0) : (midY + 36 + i*16);
      // posisikan teks di sepanjang sisi tulang
      var tx = (s.sx + endX)/2 - 60;
      var ty = (midY + endY)/2 + (s.dir<0? (-i*15-6) : (i*15+10));
      svg += '<text x="'+tx+'" y="'+ty+'" font-size="9.5" fill="#374151">&#8226; '+escSvg(x.cause).slice(0,34)+'</text>';
    });
  });
  svg += '</svg>';
  host.innerHTML = svg;
}
function escSvg(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
// teks SVG multi-baris sederhana (word wrap manual)
function fishText(x,y,str,maxChars,maxLines,color,size,bold){
  str=String(str==null?'':str); var words=str.split(' '), lines=[], cur='';
  for(var i=0;i<words.length;i++){ var t=cur?cur+' '+words[i]:words[i]; if(t.length>maxChars){ if(cur)lines.push(cur); cur=words[i]; } else cur=t; if(lines.length>=maxLines)break; }
  if(cur&&lines.length<maxLines)lines.push(cur);
  return lines.map(function(l,i){ return '<text x="'+x+'" y="'+(y+i*14)+'" font-size="'+size+'" font-weight="'+(bold?700:400)+'" fill="'+color+'">'+escSvg(l)+'</text>'; }).join('');
}

function confBadge(c){
  var n = Number(c)||0; var pct = Math.round(n*100);
  var color = n>=0.85 ? 'bg-green-100 text-green-700' : (n>=0.6 ? 'bg-amber-100 text-amber-700' : 'bg-gray-100 text-gray-500');
  return '<span class="num text-[10px] font-semibold px-1.5 py-0.5 rounded '+color+'" title="Tingkat keyakinan sistem">'+pct+'%</span>';
}
function methodTag(m){
  if(!m) return '';
  var label = String(m);
  var color = label.indexOf('AI')>=0 ? 'bg-blue-50 text-blue-600' : (label==='rule' ? 'bg-gray-100 text-gray-500' : 'bg-purple-50 text-purple-600');
  var txt = label==='rule' ? 'data' : (label==='keyword' ? 'keyword' : label);
  return '<span class="text-[10px] px-1.5 py-0.5 rounded '+color+'">'+esc(txt)+'</span>';
}
function findingRow(it, kind){
  var border = kind==='plus' ? 'border-green-200' : 'border-rose-200';
  var status = (String(it.status||'').indexOf('tinjau')>=0)
    ? '<span class="text-[10px] text-amber-600 font-semibold">&#9888; perlu ditinjau</span>' : '';
  return '<div class="rounded-lg border '+border+' p-3 bg-white">'+
    '<div class="flex items-center justify-between gap-2 mb-1">'+
      '<p class="font-semibold text-sm">'+esc(it.aspek||'-')+'</p>'+
      '<div class="flex items-center gap-1.5 shrink-0">'+methodTag(it.metode)+confBadge(it.confidence)+'</div>'+
    '</div>'+
    '<p class="text-sm text-gray-700">'+esc(it.temuan||'-')+'</p>'+
    (it.bukti?'<p class="text-xs text-gray-400 mt-1 italic">&ldquo;'+esc(it.bukti)+'&rdquo;</p>':'')+
    '<div class="flex items-center justify-between mt-1.5"><span class="text-[10px] text-gray-400">'+esc(it.sumber||'')+'</span>'+status+'</div>'+
  '</div>';
}
function analysisCard(s){
  var plus = (s.kelebihan||[]);
  var minus = (s.kekurangan||[]);
  var plusHtml = plus.length ? plus.map(function(it){return findingRow(it,'plus');}).join('') : '<p class="text-sm text-gray-300">Belum ada kelebihan terdeteksi.</p>';
  var minusHtml = minus.length ? minus.map(function(it){return findingRow(it,'minus');}).join('') : '<p class="text-sm text-gray-300">Tidak ada kekurangan menonjol.</p>';
  return '<div class="card p-5 fade-in">'+
    '<div class="flex items-center justify-between flex-wrap gap-2 mb-4 pb-3 border-b border-gray-100">'+
      '<div><h3 class="text-lg font-extrabold">'+esc(s.name)+'</h3>'+
        '<p class="text-xs text-gray-400">'+esc(s.division||'-')+' &middot; '+esc(s.tipe||'Karyawan')+'</p></div>'+
      '<div class="flex gap-2 text-xs"><span class="px-2 py-1 rounded-md bg-green-50 text-green-700 font-semibold num">'+plus.length+' kelebihan</span>'+
        '<span class="px-2 py-1 rounded-md bg-rose-50 text-rose-700 font-semibold num">'+minus.length+' kekurangan</span></div>'+
    '</div>'+
    '<div class="grid md:grid-cols-2 gap-4">'+
      '<div><p class="text-xs font-bold text-green-600 uppercase tracking-wide mb-2">&#10003; Kelebihan</p><div class="space-y-2">'+plusHtml+'</div></div>'+
      '<div><p class="text-xs font-bold text-rose-600 uppercase tracking-wide mb-2">&#9888; Kekurangan</p><div class="space-y-2">'+minusHtml+'</div></div>'+
    '</div>'+
  '</div>';
}

function onValPayload(d){
  if(_handleAuth_(d)) return;

  VAL.payload = d;
  var sel = $('valSubject');
  if(!d.subjects.length){ sel.innerHTML='<option value="">(belum ada data)</option>'; $('valItems').innerHTML = emptyState('Belum ada '+(VAL.kind==='manager'?'manager':'karyawan')+' yang mengisi form mandiri.'); $('valProgress').textContent='0 dari 0'; return; }

function onValSubject(){

  var existing = VAL.payload.existing[name] || {};
  VAL.state = (rec?rec.items:[]).map(function(it){
    var ex = existing[it.q] || {};
    return { q:it.q, a:it.a, type:it.type, comp:it.comp, options:it.options,
      status: ex.status||'', level: ex.level||'', note: ex.note||'' };

function renderValItems(){

  VAL.state.forEach(function(it,i){ html += valCard(it,i); });
  html += '</div>';
  $('valItems').innerHTML = html;
  $('valSaveBar').innerHTML =
    '<div class="sticky bottom-4 mt-5 flex justify-end">'+
      '<button onclick="saveValidationNow()" class="px-6 py-3 rounded-xl bg-brand hover:bg-brand-dark text-ink font-bold shadow-lg">Simpan Validasi</button>'+
    '</div>';
}
function valCard(it,i){
  var isBars = it.type==='bars';
  var okLabel = 'Benar';
  var noLabel = isBars ? 'Tidak' : 'Kurang Tepat';
  var okActive = it.status===okLabel, noActive = it.status===noLabel;
  var head =
    '<div class="card p-4">'+
    '<p class="text-xs font-semibold text-gray-400">'+(isBars?'KOMPETENSI: '+esc(it.comp):'PERTANYAAN')+'</p>'+
    (isBars?'':'<p class="font-semibold text-sm mt-0.5">'+esc(it.q)+'</p>')+
    '<p class="text-xs text-gray-400 mt-2">Jawaban '+(VAL.kind==='manager'?'manager':'karyawan')+'</p>'+
    '<p class="text-sm bg-surface rounded-lg p-2 mt-1 whitespace-pre-wrap">'+esc(it.a||'(kosong)')+'</p>'+
    '<div class="flex gap-2 mt-3">'+
      '<button onclick="valStatus('+i+',\''+okLabel+'\')" id="vok-'+i+'" class="px-4 py-1.5 rounded-lg text-sm font-semibold border '+(okActive?'bg-l5 text-ink border-l5':'bg-white text-gray-500 border-gray-200')+'">\u2713 '+okLabel+'</button>'+
      '<button onclick="valStatus('+i+',\''+noLabel+'\')" id="vno-'+i+'" class="px-4 py-1.5 rounded-lg text-sm font-semibold border '+(noActive?'bg-l1 text-ink border-l1':'bg-white text-gray-500 border-gray-200')+'">\u2717 '+noLabel+'</button>'+
    '</div>';
  var cond = '<div id="vcond-'+i+'" class="mt-3 '+(noActive?'':'hidden')+'">';
  if(isBars){
    cond += '<label class="text-xs font-semibold text-gray-400">Pilih level yang benar menurut Anda</label>'+
      '<select onchange="valLevel('+i+',this.value)" class="w-full mt-1 px-3 py-2 rounded-lg border border-gray-200 text-sm outline-none focus:border-brand">'+
      '<option value="">— pilih level —</option>'+
      (it.options||[]).map(function(opt,li){ var sel=(String(it.level)===String(li+1))?' selected':''; return '<option value="'+(li+1)+'"'+sel+'>L'+(li+1)+' — '+esc(opt)+'</option>'; }).join('')+
      '</select>';
  } else {
    cond += '<label class="text-xs font-semibold text-gray-400">Penjelasan kenapa kurang tepat</label>'+
      '<textarea oninput="valNote('+i+',this.value)" rows="2" class="w-full mt-1 px-3 py-2 rounded-lg border border-gray-200 text-sm outline-none focus:border-brand" placeholder="Tuliskan koreksi / penjelasan...">'+esc(it.note||'')+'</textarea>';
  }
  cond += '</div></div>';
  return head + cond;
}
function valStatus(i,status){
  var it = VAL.state[i]; it.status = status;
  var isBars = it.type==='bars';
  var noLabel = isBars ? 'Tidak' : 'Kurang Tepat';
  $('vok-'+i).className = 'px-4 py-1.5 rounded-lg text-sm font-semibold border '+(status==='Benar'?'bg-l5 text-ink border-l5':'bg-white text-gray-500 border-gray-200');
  $('vno-'+i).className = 'px-4 py-1.5 rounded-lg text-sm font-semibold border '+(status===noLabel?'bg-l1 text-ink border-l1':'bg-white text-gray-500 border-gray-200');
  var cond=$('vcond-'+i);
  if(status===noLabel){ cond.classList.remove('hidden'); }
  else { cond.classList.add('hidden'); if(isBars) it.level=''; else it.note=''; }
}
function valNote(i,v){ VAL.state[i].note=v; }
function valLevel(i,v){ VAL.state[i].level=v; }
function saveValidationNow(){
  var validator;
  if(VAL.kind==='manager'){
    validator = 'Rian Mohamad Yusuf';
  } else {
    var inp = $('valValidator');
    validator = inp ? inp.value.trim() : '';
    if(!validator){ alert('Isi nama validator dulu.'); if(inp) inp.focus(); return; }
  }
  if(!VAL.subject){ alert('Pilih subjek dulu.'); return; }
  var bar = $('valSaveBar');
  bar.innerHTML = '<div class="sticky bottom-4 mt-5 flex justify-end"><button disabled class="px-6 py-3 rounded-xl bg-gray-300 text-gray-600 font-bold">Menyimpan...</button></div>';
  google.script.run.withSuccessHandler(function(res){
    if(res && res._error){ alert('Gagal: '+res._error); renderValItems(); return; }
    bar.innerHTML = '<div class="sticky bottom-4 mt-5 flex justify-end items-center gap-3">'+
      '<span class="text-green-600 text-sm font-semibold">\u2713 Tersimpan ('+res.saved+' item)</span>'+
      '<button onclick="saveValidationNow()" class="px-6 py-3 rounded-xl bg-brand hover:bg-brand-dark text-ink font-bold shadow-lg">Simpan Ulang</button></div>';
    loadValidation();
  }).withFailureHandler(function(e){ alert('Gagal: '+e.message); renderValItems(); }).saveValidation(VAL.kind, validator, VAL.subject, JSON.stringify(VAL.state), SESSION_TOKEN);
}
</script>
</body>
</html>
